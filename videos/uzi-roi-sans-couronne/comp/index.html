<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @font-face { font-family: 'Sora'; src: local('Sora'); }
      @font-face { font-family: 'Sora'; font-weight: 600; src: local('Sora SemiBold'); }
      @font-face { font-family: 'Sora'; font-weight: 700; src: local('Sora Bold'); }
      @font-face { font-family: 'Sora'; font-weight: 800; src: local('Sora ExtraBold'); }
      @font-face { font-family: 'Manrope'; src: local('Manrope'); }
      @font-face { font-family: 'Manrope'; font-weight: 500; src: local('Manrope Medium'); }
      @font-face { font-family: 'Manrope'; font-weight: 600; src: local('Manrope SemiBold'); }
      @font-face { font-family: 'Manrope'; font-weight: 700; src: local('Manrope Bold'); }
      @font-face { font-family: 'JetBrains Mono'; src: local('JetBrains Mono'); }
      @font-face { font-family: 'JetBrains Mono'; font-weight: 700; src: local('JetBrains Mono Bold'); }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0; width: 1080px; height: 1920px;
        overflow: hidden; background: #070a0d;
      }
      body { font-family: 'Manrope', system-ui, sans-serif; }
      h1, h2, h3 { font-family: 'Sora', sans-serif; color: #fff; letter-spacing: -0.01em; }
      .mono { font-family: 'JetBrains Mono', monospace; }

      /* Macro DA colors */
      :root {
        --cyan: #00c2e0;
        --cyan-bright: #19d6f2;
        --cyan-deep: #0a8aa0;
        --ink: #070a0d;
        --fg: #dfdfdf;
        --fg-dim: #9aa7b0;
        --lol-accent: #00c2e0;
      }
    </style>
  </head>
  <body>
    <!-- ═══ MAIN COMPOSITION — 1080×1920, 22s ═══ -->
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="22"
      data-width="1080"
      data-height="1920"
      style="position: relative; width: 1080px; height: 1920px; overflow: hidden; background: #070a0d"
    >

      <!-- ── TRACK 0: Background video (Uzi footage) ── -->
      <video
        id="bg-video"
        class="clip"
        src="assets/uzi-footage.mp4"
        muted
        preload="auto"
        data-start="0"
        data-duration="22"
        data-track-index="0"
        style="position: absolute; inset: 0; z-index: 0; width: 1080px; height: 1920px; object-fit: cover"
      ></video>

      <!-- ── TRACK 1: Dark gradient overlay (bottom fade for text) ── -->
      <div
        id="gradient-overlay"
        class="clip"
        data-start="0"
        data-duration="22"
        data-track-index="1"
        style="position: absolute; inset: 0; z-index: 1; pointer-events: none"
      >
        <!-- Top vignette -->
        <div style="
          position: absolute; top: 0; left: 0; right: 0; height: 500px;
          background: linear-gradient(180deg, rgba(7,10,13,0.85) 0%, rgba(7,10,13,0.3) 40%, transparent 100%);
        "></div>
        <!-- Bottom heavy gradient for text legibility -->
        <div style="
          position: absolute; bottom: 0; left: 0; right: 0; height: 900px;
          background: linear-gradient(0deg, rgba(7,10,13,0.95) 0%, rgba(7,10,13,0.75) 35%, rgba(7,10,13,0.2) 70%, transparent 100%);
        "></div>
        <!-- Cyan glow (Macro DA radial) -->
        <div style="
          position: absolute; bottom: 0; left: 0; right: 0; height: 600px;
          background: radial-gradient(ellipse 800px 400px at 50% 100%, rgba(0,194,224,0.08) 0%, transparent 70%);
        "></div>
      </div>

      <!-- ── TRACK 2: Curves overlay (Macro néon curves) ── -->
      <div
        id="curves"
        class="clip"
        data-start="0"
        data-duration="22"
        data-track-index="2"
        style="position: absolute; inset: 0; z-index: 2; pointer-events: none; opacity: 0.12; mix-blend-mode: screen"
      >
        <img src="assets/curves-overlay.png" style="width: 1080px; height: 1920px; object-fit: cover" />
      </div>

      <!-- ── TRACK 3: Top bar — Macro logo + LoL badge ── -->
      <div
        id="top-bar"
        class="clip"
        data-start="0"
        data-duration="22"
        data-track-index="3"
        style="
          position: absolute; top: 60px; left: 60px; right: 60px; z-index: 10;
          display: flex; align-items: center; gap: 20px;
        "
      >
        <img id="macro-logo" src="assets/macro-logo.png" style="height: 40px; width: auto; opacity: 0" />
        <div id="cyan-bar" style="width: 2px; height: 30px; background: var(--cyan); opacity: 0"></div>
        <div id="game-badge" style="
          display: flex; align-items: center; gap: 10px; opacity: 0;
        ">
          <img src="assets/lol_embleme.png" style="height: 28px; width: auto" />
          <span style="
            font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 700;
            letter-spacing: 0.18em; text-transform: uppercase; color: var(--cyan);
          ">League of Legends</span>
        </div>
      </div>

      <!-- ── TRACK 4: Eyebrow label ── -->
      <div
        id="eyebrow"
        class="clip"
        data-start="1"
        data-duration="21"
        data-track-index="4"
        style="
          position: absolute; bottom: 520px; left: 70px; z-index: 10;
          font-family: 'Sora', sans-serif; font-size: 18px; font-weight: 700;
          letter-spacing: 0.2em; text-transform: uppercase; color: var(--cyan);
          opacity: 0;
        "
      >PORTRAIT · LÉGENDE</div>

      <!-- ── TRACK 5: Main title ── -->
      <div
        id="title-block"
        class="clip"
        data-start="1.5"
        data-duration="20.5"
        data-track-index="5"
        style="
          position: absolute; bottom: 300px; left: 70px; right: 70px; z-index: 10;
        "
      >
        <h1 id="title-line1" style="
          font-size: 72px; font-weight: 800; color: #fff; line-height: 1.05;
          opacity: 0;
        ">Uzi,</h1>
        <h1 id="title-line2" style="
          font-size: 72px; font-weight: 800; color: #fff; line-height: 1.05;
          opacity: 0;
        ">le roi <span style="color: var(--cyan)">sans</span></h1>
        <h1 id="title-line3" style="
          font-size: 72px; font-weight: 800; color: var(--cyan); line-height: 1.05;
          opacity: 0;
        ">couronne</h1>
        <h1 id="title-lol" style="
          font-size: 38px; font-weight: 600; color: var(--fg-dim); line-height: 1.3;
          margin-top: 10px; opacity: 0;
        ">de League of Legends</h1>
      </div>

      <!-- ── TRACK 6: Accent line under title ── -->
      <div
        id="accent-line"
        class="clip"
        data-start="3"
        data-duration="19"
        data-track-index="6"
        style="
          position: absolute; bottom: 270px; left: 70px; z-index: 10;
          width: 0; height: 3px; background: var(--cyan);
          box-shadow: 0 0 20px rgba(0,194,224,0.5);
        "
      ></div>

      <!-- ── TRACK 7: Description text ── -->
      <div
        id="desc"
        class="clip"
        data-start="4"
        data-duration="18"
        data-track-index="7"
        style="
          position: absolute; bottom: 160px; left: 70px; right: 70px; z-index: 10;
          font-family: 'Manrope', sans-serif; font-size: 26px; font-weight: 500;
          color: var(--fg-dim); line-height: 1.5; opacity: 0;
        "
      >Le joueur le plus talentueux à n'avoir jamais remporté les Worlds. 8 ans de carrière. 0 titre mondial.</div>

      <!-- ── TRACK 8: Stats bar ── -->
      <div
        id="stats-bar"
        class="clip"
        data-start="6"
        data-duration="16"
        data-track-index="8"
        style="
          position: absolute; bottom: 70px; left: 70px; right: 70px; z-index: 10;
          display: flex; justify-content: space-between; gap: 20px;
        "
      >
        <div id="stat1" class="stat-item" style="
          text-align: center; flex: 1; opacity: 0;
          background: rgba(7,10,13,0.6); border: 1px solid rgba(0,194,224,0.2);
          border-radius: 12px; padding: 16px 10px;
        ">
          <div class="mono" style="font-size: 36px; font-weight: 700; color: var(--cyan)">5x</div>
          <div style="font-size: 14px; color: var(--fg-dim); margin-top: 4px; font-family: 'Sora', sans-serif; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase">Worlds</div>
        </div>
        <div id="stat2" class="stat-item" style="
          text-align: center; flex: 1; opacity: 0;
          background: rgba(7,10,13,0.6); border: 1px solid rgba(0,194,224,0.2);
          border-radius: 12px; padding: 16px 10px;
        ">
          <div class="mono" style="font-size: 36px; font-weight: 700; color: var(--cyan)">2x</div>
          <div style="font-size: 14px; color: var(--fg-dim); margin-top: 4px; font-family: 'Sora', sans-serif; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase">Finaliste</div>
        </div>
        <div id="stat3" class="stat-item" style="
          text-align: center; flex: 1; opacity: 0;
          background: rgba(7,10,13,0.6); border: 1px solid rgba(0,194,224,0.2);
          border-radius: 12px; padding: 16px 10px;
        ">
          <div class="mono" style="font-size: 36px; font-weight: 700; color: #ff4d57">0</div>
          <div style="font-size: 14px; color: var(--fg-dim); margin-top: 4px; font-family: 'Sora', sans-serif; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase">Titre</div>
        </div>
      </div>

      <!-- ── TRACK 9: Slide counter (Macro style) ── -->
      <div
        id="counter"
        class="clip"
        data-start="0"
        data-duration="22"
        data-track-index="9"
        style="
          position: absolute; bottom: 30px; right: 30px; z-index: 15;
          font-family: 'JetBrains Mono', monospace; font-size: 13px;
          color: rgba(255,255,255,0.25); opacity: 0;
        "
      >macro.gg</div>

    </div>

    <!-- ═══ GSAP TIMELINE ═══ -->
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Top bar fade in (0s → 1.2s)
      tl.fromTo("#macro-logo", { opacity: 0, x: -20 }, { opacity: 1, x: 0, duration: 0.8, ease: "power2.out" }, 0.3);
      tl.fromTo("#cyan-bar", { opacity: 0, scaleY: 0 }, { opacity: 1, scaleY: 1, duration: 0.4, ease: "power2.out" }, 0.6);
      tl.fromTo("#game-badge", { opacity: 0, x: -15 }, { opacity: 1, x: 0, duration: 0.6, ease: "power2.out" }, 0.7);

      // Counter
      tl.fromTo("#counter", { opacity: 0 }, { opacity: 1, duration: 0.5 }, 0.5);

      // Eyebrow
      tl.fromTo("#eyebrow", { opacity: 0, y: 15 }, { opacity: 1, y: 0, duration: 0.7, ease: "power3.out" }, 1.0);

      // Title lines — staggered cinematic reveal
      tl.fromTo("#title-line1", { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 0.7, ease: "power3.out" }, 1.5);
      tl.fromTo("#title-line2", { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 0.7, ease: "power3.out" }, 1.9);
      tl.fromTo("#title-line3", { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 0.7, ease: "power3.out" }, 2.3);
      tl.fromTo("#title-lol",   { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" }, 2.8);

      // Accent line wipe
      tl.to("#accent-line", { width: 200, duration: 0.8, ease: "power2.inOut" }, 3.0);

      // Description
      tl.fromTo("#desc", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.8, ease: "power2.out" }, 4.0);

      // Stats — staggered pop in
      tl.fromTo("#stat1", { opacity: 0, y: 30, scale: 0.9 }, { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "back.out(1.5)" }, 6.0);
      tl.fromTo("#stat2", { opacity: 0, y: 30, scale: 0.9 }, { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "back.out(1.5)" }, 6.3);
      tl.fromTo("#stat3", { opacity: 0, y: 30, scale: 0.9 }, { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "back.out(1.5)" }, 6.6);

      // Subtle pulse on "0 titre" stat for emphasis
      tl.to("#stat3", { scale: 1.05, duration: 0.3, ease: "power1.inOut", yoyo: true, repeat: 1 }, 7.5);

      // End: fade out all overlays before video ends
      tl.to("#eyebrow", { opacity: 0, duration: 0.8, ease: "power2.in" }, 19.5);
      tl.to("#title-block", { opacity: 0, y: -20, duration: 1, ease: "power2.in" }, 19.5);
      tl.to("#accent-line", { opacity: 0, width: 0, duration: 0.8, ease: "power2.in" }, 19.5);
      tl.to("#desc", { opacity: 0, duration: 0.8, ease: "power2.in" }, 19.8);
      tl.to("#stats-bar", { opacity: 0, y: 20, duration: 0.8, ease: "power2.in" }, 20.0);
      tl.to("#top-bar", { opacity: 0, duration: 0.6, ease: "power2.in" }, 20.5);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
